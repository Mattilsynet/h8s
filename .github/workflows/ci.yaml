name: CI

on:
  push:
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
      - Taskfile.yml
      - .github/workflows/*.y*ml
  pull_request:
    paths:
      - '**/*.go'
      - go.mod
      - go.sum
      - Taskfile.yml
      - .github/workflows/*.y*ml

permissions:
  contents: read

jobs:
  checks:
    name: task ci checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Task
        uses: go-task/setup-task@v1

      - name: Run CI task
        run: task ci

      - name: Ensure tracked files were not mutated
        run: test -z "$(git status --porcelain)"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error

  race:
    name: race tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run race tests
        run: go test -race ./...
