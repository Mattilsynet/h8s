# .github/workflows/docker-build.yaml

name: Build and Push to GHCR

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'cmd/**'
      - 'pkg/**'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
    strategy:
      matrix:
        app: [h8sd, h8srd]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to GHCR (stable tags)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/mattilsynet/${{ matrix.app }}:${{ env.TAG }}
            ghcr.io/mattilsynet/${{ matrix.app }}:latest

      - name: Build and push Docker image to GHCR (pre-release tags)
        if: ${{ contains(github.ref_name, '-') }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/mattilsynet/${{ matrix.app }}:${{ env.TAG }}
